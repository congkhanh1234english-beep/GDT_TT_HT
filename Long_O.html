<script>
'use strict';
const DATA=JSON.parse(document.getElementById('sourceData').textContent);
const RIMES=["one","ope","ole","ode","oke","obe","oze","ome","ose","ote","ove","o","ost","oss","othe","oat","oad","oak","oam","oan","oal","oast","oaf","oax","oap","oath","oe","old","olk","oll","olt","ow"];
const families=DATA.families.map((f,fi)=>({...f,index:fi,rime:f.rime||'a',words:f.words.map((w,wi)=>({...w,fi,wi}))}));
const allWords=families.flatMap(f=>f.words);
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let state={fi:+localStorage.getItem('wflo_rebuilt_fi')||0,wi:+localStorage.getItem('wflo_rebuilt_wi')||0,view:'overview',rime:'all',affixMode:'prefix',builder:[],builderKey:'',builderShuffle:null,builderIpa:[],builderIpaKey:'',builderIpaShuffle:null,quiz:null};
if(!families[state.fi]) state.fi=0;if(!families[state.fi].words[state.wi]) state.wi=0;
const progress=JSON.parse(localStorage.getItem('wflo_rebuilt_progress')||'{"correct":0,"total":0,"streak":0,"best":0,"learned":[],"errors":[]}');
const prefixInfo={un:'không / ngược lại',re:'lại, một lần nữa',dis:'không / tách ra',in:'vào trong / không',im:'vào trong / không',en:'làm cho / đưa vào',em:'làm cho / đưa vào',over:'quá mức / ở trên',under:'thiếu / ở dưới',out:'vượt hơn / ra ngoài',pre:'trước',post:'sau',mis:'sai',non:'không',de:'bỏ đi / làm giảm',be:'làm cho / bao quanh',fore:'trước',inter:'giữa',sub:'dưới',super:'siêu / vượt',trans:'qua / chuyển',co:'cùng',counter:'chống lại',ex:'cựu / ra khỏi',anti:'chống',pro:'ủng hộ / tiến về trước'};
const suffixInfo={s:'số nhiều hoặc ngôi thứ ba',es:'số nhiều / ngôi thứ ba',ed:'đã xảy ra / quá khứ',ing:'đang diễn ra / hoạt động',er:'người làm hoặc so sánh hơn',est:'mức cao nhất',ly:'một cách... (trạng từ)',ness:'trạng thái / tính chất',ish:'hơi, có tính...',y:'có đặc điểm...',ful:'đầy, có nhiều',less:'không có',en:'làm cho trở nên',ist:'người theo / người làm',able:'có thể',ment:'kết quả / quá trình',tion:'hành động / quá trình',al:'thuộc về',ance:'trạng thái / hành động',ence:'trạng thái / tính chất',hood:'trạng thái / giai đoạn',like:'giống như',dom:'trạng thái / lãnh địa',ship:'trạng thái / kỹ năng',ize:'làm cho',ise:'làm cho',ity:'tính chất',ous:'có tính',ive:'có xu hướng',ian:'người / thuộc về'};
function save(){localStorage.setItem('wflo_rebuilt_fi',state.fi);localStorage.setItem('wflo_rebuilt_wi',state.wi);localStorage.setItem('wflo_rebuilt_progress',JSON.stringify(progress));}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function currentFamily(){return families[state.fi]}
function currentWord(){return currentFamily().words[state.wi]}
function shuffle(a){a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function uniq(a){return [...new Set(a)]}
function normalize(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9æɑɒɔəɜʃʒθðŋ]+/g,' ').trim()}
function switchView(view){state.view=view;$$('.view').forEach(v=>v.classList.toggle('active',v.id===view));$$('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));if(view==='study')renderStudy();if(view==='reading')renderReading();if(view==='builder')renderBuilder();if(view==='affixes')renderAffixes();if(view==='quiz')renderQuiz();if(view==='results')renderResults();window.scrollTo({top:0,behavior:'smooth'})}
function selectFamily(fi,wi=0,view=state.view){state.fi=+fi;state.wi=Math.min(+wi,families[fi].words.length-1);state.builder=[];save();renderSidebar();renderMobile();switchView(view);}
function selectWord(wi,view=state.view){state.wi=+wi;state.builder=[];save();if(view==='study')renderStudy();else if(view==='reading')renderReading();else if(view==='builder')renderBuilder();else switchView(view)}
function speak(text,rate=.85){if(!('speechSynthesis'in window)){toast('Trình duyệt chưa hỗ trợ đọc tiếng.');return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-GB';u.rate=rate;const voices=speechSynthesis.getVoices();u.voice=voices.find(v=>/^en-GB/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang))||null;speechSynthesis.speak(u)}
function speakSequence(items,rate=.82){if(!items.length)return;speechSynthesis.cancel();let i=0;const next=()=>{if(i>=items.length)return;const u=new SpeechSynthesisUtterance(items[i++]);u.lang='en-GB';u.rate=rate;const voices=speechSynthesis.getVoices();u.voice=voices.find(v=>/^en-GB/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang))||null;u.onend=next;speechSynthesis.speak(u)};next()}
function parseParts(w,f=currentFamily()){
 const s=w.structure.trim();
 if(!s||/gốc từ/i.test(s)||normalize(s)===normalize(w.word)||normalize(s)===normalize(f.root))return[{text:f.root,type:'root'}];
 if(s.includes('→')||/bất quy tắc|so sánh .* của/i.test(s))return[{text:s,type:'special'}];
 let toks=s.split('+').map(x=>x.trim()).filter(Boolean);
 if(toks.length<2)return[{text:s,type:'special'}];
 let ri=toks.findIndex(t=>normalize(t)===normalize(f.root)||normalize(t).includes(normalize(f.root))||normalize(f.root).includes(normalize(t)));
 if(ri<0){const idx=toks.findIndex(t=>normalize(w.word).includes(normalize(t)));ri=idx<0?0:idx}
 return toks.map((t,i)=>({text:t,type:i<ri?'prefix':i===ri?'root':'suffix'}));
}
function affixMeaning(text,type){let a=normalize(text).split(' ')[0];return type==='prefix'?(prefixInfo[a]||'đứng trước và đổi hướng nghĩa'):(suffixInfo[a]||'đứng sau và đổi dạng/từ loại')}
function renderSidebar(){
 const rimes=['all',...RIMES.filter(r=>families.some(f=>f.rime===r))];
 $('#rimeChips').innerHTML=rimes.map(r=>`<button class="${state.rime===r?'active':''}" data-rime="${r}">${r==='all'?'Tất cả':'-'+r}</button>`).join('');
 const shown=families.filter(f=>state.rime==='all'||f.rime===state.rime);
 $('#familyList').innerHTML=shown.map(f=>`<button class="family-btn ${f.index===state.fi?'active':''}" data-fi="${f.index}"><b>${esc(f.root)}</b><span class="count">${f.words.length}</span></button>`).join('');
 $$('#rimeChips button').forEach(b=>b.onclick=()=>{state.rime=b.dataset.rime;renderSidebar()});
 $$('.family-btn').forEach(b=>b.onclick=()=>selectFamily(b.dataset.fi,0,state.view==='overview'?'study':state.view));
}
function renderMobile(){const s=$('#mobileFamily');s.innerHTML=families.map(f=>`<option value="${f.index}" ${f.index===state.fi?'selected':''}>-${f.rime} • ${f.root} (${f.words.length} từ)</option>`).join('');s.onchange=e=>selectFamily(e.target.value,0,state.view==='overview'?'study':state.view)}
function renderSearch(q){q=normalize(q);const box=$('#searchResults');if(q.length<2){box.innerHTML='';return}const hits=allWords.filter(w=>normalize(w.word).includes(q)||normalize(w.meaning).includes(q)||normalize(families[w.fi].root).includes(q)).slice(0,12);box.innerHTML=`<div class="section-label">Kết quả</div>`+(hits.length?hits.map(w=>`<button class="family-btn search-hit" data-fi="${w.fi}" data-wi="${w.wi}"><span><b>${esc(w.word)}</b><br><small>${esc(w.meaning.slice(0,38))}</small></span><span class="count">-${families[w.fi].rime}</span></button>`).join(''):'<div class="empty">Không tìm thấy.</div>');$$('.search-hit').forEach(b=>b.onclick=()=>selectFamily(b.dataset.fi,b.dataset.wi,'study'))}
function renderOverview(){

 $$('.word-chip').forEach(b=>b.onclick=()=>selectWord(b.dataset.wi,'builder'));

function addPiece(i){if(!state.builder.includes(i)){state.builder.push(i);renderBuilder()}}
function removePiece(i){state.builder=state.builder.filter(x=>x!==i);renderBuilder()}
function addIpaPiece(i){if(!state.builderIpa.includes(i)){state.builderIpa.push(i);renderBuilder()}}
function removeIpaPiece(i){state.builderIpa=state.builderIpa.filter(x=>x!==i);renderBuilder()}
function collectAffixes(){const map={prefix:{},suffix:{}};families.forEach(f=>f.words.forEach(w=>parseParts(w,f).forEach(p=>{if(!['prefix','suffix'].includes(p.type))return;const key=normalize(p.text).split(' ')[0];if(!key)return;const bucket=map[p.type][key]||(map[p.type][key]={count:0,examples:[]});bucket.count++;if(bucket.examples.length<5&&!bucket.examples.includes(w.word))bucket.examples.push(w.word)})));return map}
const AFFIXES=collectAffixes();
function renderAffixes(){const mode=state.affixMode,items=Object.entries(AFFIXES[mode]).sort((a,b)=>b[1].count-a[1].count),max=Math.max(...items.map(x=>x[1].count),1);
 $('#affixes').innerHTML=`<div class="card"><span class="tape">BẢN ĐỒ MẢNH GHÉP</span><h2>Tiền tố và hậu tố xuất hiện trong tài liệu</h2><p>Hãy đọc mỗi mảnh như một “nút lệnh”: gắn vào từ gốc, nó sẽ thêm một chức năng mới.</p><div class="affix-tabs"><button class="btn ${mode==='prefix'?'':'secondary'}" data-affix="prefix">🎩 Tiền tố</button><button class="btn ${mode==='suffix'?'':'secondary'}" data-affix="suffix">🦎 Hậu tố</button></div><div class="affix-grid">${items.map(([a,o])=>`<div class="affix-card"><h4>${mode==='prefix'?a+'-':'-'+a}</h4><b>${esc(affixMeaning(a,mode))}</b><div class="examples">Ví dụ: ${o.examples.map(esc).join(', ')}</div><div class="meter"><span style="width:${Math.max(4,o.count/max*100)}%"></span></div><small>${o.count} lần xuất hiện</small></div>`).join('')}</div></div>`;$$('[data-affix]').forEach(b=>b.onclick=()=>{state.affixMode=b.dataset.affix;renderAffixes()})}
const quizTypes={mixed:'Trộn 8 dạng',meaning:'Chọn nghĩa',word:'Chọn từ',ipa:'Chọn IPA',structure:'Tách cấu trúc',pos:'Nhận diện từ loại',affix:'Ý nghĩa phụ tố',truefalse:'Đúng / Sai',typing:'Gõ từ'};
function makeQuestion(type='mixed'){
 if(type==='mixed')type=shuffle(Object.keys(quizTypes).filter(x=>!['mixed'].includes(x)))[0];
 const w=allWords[Math.floor(Math.random()*allWords.length)],f=families[w.fi],pool=shuffle(allWords.filter(x=>x.word!==w.word));let q={type,w,answer:'',options:[],prompt:'',label:quizTypes[type]};
 const opts=(correct,wrong)=>shuffle(uniq([correct,...wrong]).slice(0,4));
 if(type==='meaning'){q.prompt=`“${w.word}” nghĩa là gì?`;q.answer=w.meaning;q.options=opts(q.answer,pool.slice(0,8).map(x=>x.meaning));}
 if(type==='word'){q.prompt=`Từ nào có nghĩa: “${w.meaning}”?`;q.answer=w.word;q.options=opts(q.answer,pool.slice(0,8).map(x=>x.word));}
 if(type==='ipa'){q.prompt=`IPA đúng của “${w.word}” là gì?`;q.answer=w.ipa;q.options=opts(q.answer,pool.slice(0,8).map(x=>x.ipa));}
 if(type==='structure'){q.prompt=`Cấu trúc của “${w.word}” là gì?`;q.answer=w.structure;q.options=opts(q.answer,pool.slice(0,8).map(x=>x.structure));}
 if(type==='pos'){q.prompt=`“${w.word}” thuộc từ loại nào?`;q.answer=w.pos;q.options=opts(q.answer,pool.slice(0,12).map(x=>x.pos));}
 if(type==='affix'){let parts=parseParts(w,f).filter(p=>['prefix','suffix'].includes(p.type));if(!parts.length)return makeQuestion('meaning');let p=parts[Math.floor(Math.random()*parts.length)];q.prompt=`Trong “${w.word}”, mảnh “${p.type==='prefix'?p.text+'-':'-'+p.text}” thường gợi nghĩa gì?`;q.answer=affixMeaning(p.text,p.type);const bank=Object.values(p.type==='prefix'?prefixInfo:suffixInfo);q.options=opts(q.answer,shuffle(bank).slice(0,8));}
 if(type==='truefalse'){const trueAns=Math.random()>.5,other=pool[0];q.prompt=trueAns?`Đúng hay sai: “${w.word}” nghĩa là “${w.meaning}”.`:`Đúng hay sai: “${w.word}” nghĩa là “${other.meaning}”.`;q.answer=trueAns?'Đúng':'Sai';q.options=['Đúng','Sai'];}
 if(type==='typing'){q.prompt=`Gõ từ có nghĩa “${w.meaning}” và IPA ${w.ipa}.`;q.answer=w.word;q.options=[];}
 return q;
}
function renderQuiz(){if(!state.quiz)state.quiz={n:1,limit:10,score:0,done:false,type:'mixed',q:makeQuestion('mixed'),answered:false};const z=state.quiz;
 $('#quiz').innerHTML=`<div class="card"><span class="tape">QUIZ 8 DẠNG</span><div class="quiz-config"><select id="quizType">${Object.entries(quizTypes).map(([k,v])=>`<option value="${k}" ${z.type===k?'selected':''}>${v}</option>`).join('')}</select><select id="quizLimit"><option ${z.limit===10?'selected':''}>10</option><option ${z.limit===20?'selected':''}>20</option><option ${z.limit===30?'selected':''}>30</option></select><button class="btn secondary" id="newQuiz">↻ Bài mới</button><span class="pill">Điểm: ${z.score}/${z.n-1+(z.answered?1:0)}</span></div></div>${z.done?quizSummary():quizQuestionHtml(z)}`;
 $('#quizType').onchange=e=>{z.type=e.target.value};$('#quizLimit').onchange=e=>z.limit=+e.target.value;$('#newQuiz').onclick=()=>{state.quiz={n:1,limit:+$('#quizLimit').value,score:0,done:false,type:$('#quizType').value,q:makeQuestion($('#quizType').value),answered:false};renderQuiz()};if(z.done){$('#retryQuiz').onclick=()=>{state.quiz=null;renderQuiz()};return}$$('.option').forEach(b=>b.onclick=()=>answerQuiz(b.dataset.answer,b));const input=$('#typedAnswer');if(input){input.onkeydown=e=>{if(e.key==='Enter')answerQuiz(input.value,null)};$('#submitTyped').onclick=()=>answerQuiz(input.value,null)}const next=$('#nextQ');if(next)next.onclick=nextQuestion;
}
function quizQuestionHtml(z){const q=z.q;return `<div class="card quiz-box"><div class="progress"><span style="width:${(z.n-1)/z.limit*100}%"></span></div><div class="qtype">Câu ${z.n}/${z.limit} • ${esc(q.label)}</div><div class="question">${esc(q.prompt)}</div>${q.type==='typing'?`<div class="typed"><input id="typedAnswer" autocomplete="off" placeholder="Gõ đáp án..."><button class="btn" id="submitTyped">Kiểm tra</button></div>`:`<div class="options">${q.options.map(o=>`<button class="option" data-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}<div id="quizFeedback" class="feedback"></div><div class="cta-row" style="margin-top:12px"><button class="btn green" id="nextQ" style="display:${z.answered?'inline-block':'none'}">Câu tiếp theo →</button><button class="btn secondary" onclick="speak('${esc(q.w.word)}',.75)">🔊 Nghe từ</button></div></div>`}
function answerQuiz(ans,btn){const z=state.quiz;if(z.answered)return;const ok=normalize(ans)===normalize(z.q.answer);z.answered=true;progress.total++;if(ok){z.score++;progress.correct++;progress.streak++;progress.best=Math.max(progress.best,progress.streak)}else{progress.streak=0;progress.errors.unshift({word:z.q.w.word,asked:z.q.prompt,your:ans||'(trống)',answer:z.q.answer,time:Date.now(),fi:z.q.w.fi,wi:z.q.w.wi});progress.errors=progress.errors.slice(0,80)}save();const fb=$('#quizFeedback');fb.className='feedback '+(ok?'ok':'no');fb.innerHTML=ok?`🎉 Đúng! <b>${esc(z.q.w.word)}</b> ${esc(z.q.w.ipa)} = ${esc(z.q.w.meaning)}`:`✍️ Chưa đúng. Đáp án: <b>${esc(z.q.answer)}</b>`;if(btn){$$('.option').forEach(x=>{if(normalize(x.dataset.answer)===normalize(z.q.answer))x.classList.add('correct')});if(!ok)btn.classList.add('wrong')}$('#nextQ').style.display='inline-block';}
function nextQuestion(){const z=state.quiz;if(z.n>=z.limit){z.done=true}else{z.n++;z.q=makeQuestion(z.type);z.answered=false}renderQuiz()}
function quizSummary(){const z=state.quiz,pct=Math.round(z.score/z.limit*100);return `<div class="card quiz-box" style="text-align:center"><div style="font-size:60px">${pct>=80?'🏆':pct>=60?'🌟':'🌱'}</div><h2>Hoàn thành ${z.limit} câu!</h2><div class="bigword">${pct}%</div><p>Đúng ${z.score}/${z.limit} câu. ${pct>=80?'Bạn đã hiểu khá chắc cấu trúc từ.':'Hãy mở Sổ lỗi và học lại các từ sai.'}</p><button class="btn" id="retryQuiz">Làm bài mới</button><button class="btn secondary" onclick="switchView('results')">Xem sổ lỗi</button></div>`}
function renderResults(){const accuracy=progress.total?Math.round(progress.correct/progress.total*100):0;$('#results').innerHTML=`<div class="card"><span class="tape">TIẾN BỘ CỦA EM</span><div class="result-grid"><div class="result-card"><b>${accuracy}%</b>Độ chính xác</div><div class="result-card"><b>${progress.best}</b>Chuỗi đúng tốt nhất</div><div class="result-card"><b>${progress.learned.length}</b>Từ đã đánh dấu thuộc</div></div></div><div class="card"><div class="family-head"><div><span class="tape">SỔ LỖI TỰ ĐỘNG</span><h2>Biến lỗi sai thành bài học</h2></div><div class="cta-row"><button class="btn secondary" id="practiceErrors">Luyện lại lỗi sai</button><button class="btn red" id="clearErrors">Xóa sổ lỗi</button></div></div><div class="error-list">${progress.errors.length?progress.errors.slice(0,30).map((e,i)=>`<div class="error-item"><b>${esc(e.word)}</b> • ${new Date(e.time).toLocaleDateString('vi-VN')}<br><small>${esc(e.asked)}</small><br><span style="color:#a33">Em chọn: ${esc(e.your)}</span> → <b>${esc(e.answer)}</b> <button class="icon-btn" data-error="${i}">Học lại</button></div>`).join(''):'<div class="empty">Chưa có lỗi sai. Hãy làm Quiz để hệ thống tự ghi lại.</div>'}</div></div><div class="card"><span class="tape">TỪ ĐÃ THUỘC</span><div class="word-chips">${progress.learned.length?progress.learned.slice(0,100).map(x=>`<span class="word-chip">✓ ${esc(x)}</span>`).join(''):'<div class="empty">Chưa đánh dấu từ nào.</div>'}</div></div>`;$$('[data-error]').forEach((b,i)=>b.onclick=()=>{const e=progress.errors[i],w=allWords.find(x=>x.word.toLowerCase()===e.word.toLowerCase());if(w)selectFamily(w.fi,w.wi,'study')});$('#clearErrors').onclick=()=>{if(confirm('Xóa toàn bộ sổ lỗi?')){progress.errors=[];save();renderResults()}};$('#practiceErrors').onclick=()=>{if(!progress.errors.length){toast('Chưa có lỗi để luyện.');return}state.quiz={n:1,limit:Math.min(10,progress.errors.length),score:0,done:false,type:'word',q:makeErrorQuestion(),answered:false};switchView('quiz')};}
function makeErrorQuestion(){const e=progress.errors[Math.floor(Math.random()*progress.errors.length)],w=allWords.find(x=>x.word.toLowerCase()===e.word.toLowerCase())||allWords[0],pool=shuffle(allWords.filter(x=>x.word!==w.word));return{type:'word',w,answer:w.word,options:shuffle([w.word,...pool.slice(0,3).map(x=>x.word)]),prompt:`Từ nào có nghĩa: “${w.meaning}”?`,label:'Luyện lại lỗi sai'}}

$('#nav').onclick=e=>{const b=e.target.closest('button[data-view]');if(b)switchView(b.dataset.view)};

$('#statFamilies').textContent=`${families.length} họ từ`;$('#statWords').textContent=`${allWords.length.toLocaleString('vi-VN')} từ`;
