const DATA=JSON.parse(document.getElementById('sourceData').textContent);
const RIMES=["udge","unch","utch","uck","ump","unk","ung","ush","usk","ust","ull","ub","uch","ud","ug","um","un","up","us","ut"];
const families=DATA.families.map((f,fi)=>({...f,index:fi,rime:f.rime||'u',words:f.words.map((w,wi)=>({...w,fi,wi}))}));
const allWords=families.flatMap(f=>f.words);
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let state={fi:+localStorage.getItem('wfo_fi')||0,wi:+localStorage.getItem('wfo_wi')||0,view:'overview',rime:'all',affixMode:'prefix',builder:[],builderKey:'',builderShuffle:null,builderIpa:[],builderIpaKey:'',builderIpaShuffle:null,quiz:null};
if(!families[state.fi]) state.fi=0;if(!families[state.fi].words[state.wi]) state.wi=0;
const progress=JSON.parse(localStorage.getItem('wfo_progress')||'{"correct":0,"total":0,"streak":0,"best":0,"learned":[],"errors":[]}');
const prefixInfo={un:'không / ngược lại',re:'lại, một lần nữa',dis:'không / tách ra',in:'vào trong / không',im:'vào trong / không',en:'làm cho / đưa vào',em:'làm cho / đưa vào',over:'quá mức / ở trên',under:'thiếu / ở dưới',out:'vượt hơn / ra ngoài',pre:'trước',post:'sau',mis:'sai',non:'không',de:'bỏ đi / làm giảm',be:'làm cho / bao quanh',fore:'trước',inter:'giữa',sub:'dưới',super:'siêu / vượt',trans:'qua / chuyển',co:'cùng',counter:'chống lại',ex:'cựu / ra khỏi',anti:'chống',pro:'ủng hộ / tiến về trước'};
const suffixInfo={s:'số nhiều hoặc ngôi thứ ba',es:'số nhiều / ngôi thứ ba',ed:'đã xảy ra / quá khứ',ing:'đang diễn ra / hoạt động',er:'người làm hoặc so sánh hơn',est:'mức cao nhất',ly:'một cách... (trạng từ)',ness:'trạng thái / tính chất',ish:'hơi, có tính...',y:'có đặc điểm...',ful:'đầy, có nhiều',less:'không có',en:'làm cho trở nên',ist:'người theo / người làm',able:'có thể',ment:'kết quả / quá trình',tion:'hành động / quá trình',al:'thuộc về',ance:'trạng thái / hành động',ence:'trạng thái / tính chất',hood:'trạng thái / giai đoạn',like:'giống như',dom:'trạng thái / lãnh địa',ship:'trạng thái / kỹ năng',ize:'làm cho',ise:'làm cho',ity:'tính chất',ous:'có tính',ive:'có xu hướng',ian:'người / thuộc về'};
function save(){localStorage.setItem('wfo_fi',state.fi);localStorage.setItem('wfo_wi',state.wi);localStorage.setItem('wfo_progress',JSON.stringify(progress));}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function currentFamily(){return families[state.fi]}
function currentWord(){return currentFamily().words[state.wi]}
function shuffle(a){a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function uniq(a){return [...new Set(a)]}
function normalize(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9æɑɒɔəɜʃʒθðŋ]+/g,' ').trim()}
function switchView(view){state.view=view;$$('.view').forEach(v=>v.classList.toggle('active',v.id===view));$$('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));if(view==='study')renderStudy();if(view==='reading')renderReading();if(view==='builder')renderBuilder();if(view==='affixes')renderAffixes();if(view==='quiz')renderQuiz();if(view==='results')renderResults();window.scrollTo({top:0,behavior:'smooth'})}
function selectFamily(fi,wi=0,view=state.view){state.fi=+fi;state.wi=Math.min(+wi,families[fi].words.length-1);state.builder=[];save();renderSidebar();renderMobile();switchView(view);}
function selectWord(wi,view=state.view){state.wi=+wi;state.builder=[];save();if(view==='study')renderStudy();else if(view==='reading')renderReading();else if(view==='builder')renderBuilder();else switchView(view)}
function speak(text,rate=.85){if(!('speechSynthesis'in window)){toast('Trình duyệt chưa hỗ trợ đọc tiếng.');return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-GB';u.rate=rate;const voices=speechSynthesis.getVoices();u.voice=voices.find(v=>/^en-GB/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang))||null;speechSynthesis.speak(u)}
function speakSequence(items,rate=.82){if(!items.length)return;speechSynthesis.cancel();let i=0;const next=()=>{if(i>=items.length)return;const u=new SpeechSynthesisUtterance(items[i++]);u.lang='en-GB';u.rate=rate;const voices=speechSynthesis.getVoices();u.voice=voices.find(v=>/^en-GB/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang))||null;u.onend=next;speechSynthesis.speak(u)};next()}
function parseParts(w,f=currentFamily()){
 const s=w.structure.trim();
 if(!s||/gốc từ/i.test(s)||normalize(s)===normalize(w.word)||normalize(s)===normalize(f.root))return[{text:f.root,type:'root'}];
 if(s.includes('→')||/bất quy tắc|so sánh .* của/i.test(s))return[{text:s,type:'special'}];
 let toks=s.split('+').map(x=>x.trim()).filter(Boolean);
 if(toks.length<2)return[{text:s,type:'special'}];
 let ri=toks.findIndex(t=>normalize(t)===normalize(f.root)||normalize(t).includes(normalize(f.root))||normalize(f.root).includes(normalize(t)));
 if(ri<0){const idx=toks.findIndex(t=>normalize(w.word).includes(normalize(t)));ri=idx<0?0:idx}
 return toks.map((t,i)=>({text:t,type:i<ri?'prefix':i===ri?'root':'suffix'}));
}
function affixMeaning(text,type){let a=normalize(text).split(' ')[0];return type==='prefix'?(prefixInfo[a]||'đứng trước và đổi hướng nghĩa'):(suffixInfo[a]||'đứng sau và đổi dạng/từ loại')}
function renderSidebar(){
 const rimes=['all',...RIMES.filter(r=>families.some(f=>f.rime===r))];
 $('#rimeChips').innerHTML=rimes.map(r=>`<button class="${state.rime===r?'active':''}" data-rime="${r}">${r==='all'?'Tất cả':'-'+r}</button>`).join('');
 const shown=families.filter(f=>state.rime==='all'||f.rime===state.rime);
 $('#familyList').innerHTML=shown.map(f=>`<button class="family-btn ${f.index===state.fi?'active':''}" data-fi="${f.index}"><b>${esc(f.root)}</b><span class="count">${f.words.length}</span></button>`).join('');
 $$('#rimeChips button').forEach(b=>b.onclick=()=>{state.rime=b.dataset.rime;renderSidebar()});
 $$('.family-btn').forEach(b=>b.onclick=()=>selectFamily(b.dataset.fi,0,state.view==='overview'?'study':state.view));
}
function renderMobile(){const s=$('#mobileFamily');s.innerHTML=families.map(f=>`<option value="${f.index}" ${f.index===state.fi?'selected':''}>-${f.rime} • ${f.root} (${f.words.length} từ)</option>`).join('');s.onchange=e=>selectFamily(e.target.value,0,state.view==='overview'?'study':state.view)}
function renderSearch(q){q=normalize(q);const box=$('#searchResults');if(q.length<2){box.innerHTML='';return}const hits=allWords.filter(w=>normalize(w.word).includes(q)||normalize(w.meaning).includes(q)||normalize(families[w.fi].root).includes(q)).slice(0,12);box.innerHTML=`<div class="section-label">Kết quả</div>`+(hits.length?hits.map(w=>`<button class="family-btn search-hit" data-fi="${w.fi}" data-wi="${w.wi}"><span><b>${esc(w.word)}</b><br><small>${esc(w.meaning.slice(0,38))}</small></span><span class="count">-${families[w.fi].rime}</span></button>`).join(''):'<div class="empty">Không tìm thấy.</div>');$$('.search-hit').forEach(b=>b.onclick=()=>selectFamily(b.dataset.fi,b.dataset.wi,'study'))}
function renderOverview(){
 const counts=Object.fromEntries(RIMES.map(r=>[r,families.filter(f=>f.rime===r).length]));
 $('#overview').innerHTML=`
 <div class="card hero"><span class="tape">SHORT VOWEL /ʌ/</span><h2>Một gốc từ → cả một “gia đình”</h2><p>Không học từng từ rời rạc. Ta nhìn từ như <b>mô hình LEGO</b>: tiền tố là chiếc mũ, gốc từ là thân, hậu tố là chiếc đuôi. Hiểu một mảnh, đoán được nhiều từ.</p><div class="cta-row"><button class="btn" onclick="switchView('study')">Bắt đầu học →</button><button class="btn secondary" onclick="switchView('quiz')">Làm quiz nhanh</button></div></div>
 <div class="card"><span class="tape">GIẢI THÍCH FEYNMAN</span><h2>Nhìn một từ thật đơn giản</h2><div class="feynman"><div class="piece prefix"><div>🎩<strong>TIỀN TỐ</strong><small>đứng trước<br>đổi hướng nghĩa</small></div></div><div class="plus">+</div><div class="piece root"><div>🧱<strong>GỐC TỪ</strong><small>phần lõi<br>giữ nghĩa chính</small></div></div><div class="plus">+</div><div class="piece suffix"><div>🦎<strong>HẬU TỐ</strong><small>đứng sau<br>đổi dạng/từ loại</small></div></div></div><div class="formula">🎯 CÔNG THỨC: <span class="highlight">NHÌN</span> → <span class="highlight">TÁCH</span> → <span class="highlight">GIẢI THÍCH</span> → <span class="highlight">DÙNG TRONG CÂU</span></div></div>
 <div class="card"><span class="tape">KHO DỮ LIỆU</span><div class="stat-grid"><div class="stat"><b>${families.length}</b>họ từ</div><div class="stat"><b>${allWords.length.toLocaleString('vi-VN')}</b>từ và biến thể</div><div class="stat"><b>${RIMES.length}</b>nhóm vần</div><div class="stat"><b>8</b>dạng luyện tập</div></div></div>
 <div class="card"><span class="tape">BẢN ĐỒ VẦN</span><h2>Chọn một “khu phố” của âm /ʌ/</h2><div class="rime-grid">${RIMES.map(r=>`<button class="rime-card" data-over-rime="${r}"><b>-${r}</b><br><span>${counts[r]||0} họ từ</span></button>`).join('')}</div></div>
 <div class="grid3"><div class="mini"><div class="icon">👀</div><h3>1. Nhìn</h3><p>Đọc từ và khoanh phần giống nhau.</p></div><div class="mini"><div class="icon">✂️</div><h3>2. Tách</h3><p>Chia thành tiền tố <span class="arrow">→</span> gốc <span class="arrow">→</span> hậu tố.</p></div><div class="mini"><div class="icon">🗣️</div><h3>3. Nói lại</h3><p>Tự giải thích như đang dạy một bạn nhỏ.</p></div></div>`;
 $$('[data-over-rime]').forEach(b=>b.onclick=()=>{state.rime=b.dataset.overRime;renderSidebar();const f=families.find(x=>x.rime===state.rime);selectFamily(f.index,0,'study')});
}
function wordSelector(f){return `<div class="word-chips">${f.words.map((w,i)=>`<button class="word-chip ${i===state.wi?'active':''}" data-wi="${i}">${esc(w.word)}</button>`).join('')}</div>`}
function partsHtml(w,f){const parts=parseParts(w,f);return `<div class="decomp">${parts.map((p,i)=>`${i?'<span class="op">+</span>':''}<div class="segment ${p.type}">${esc(p.text)}<small>${p.type==='prefix'?'tiền tố':p.type==='root'?'gốc từ':p.type==='suffix'?'hậu tố':'biến đổi đặc biệt'}</small></div>`).join('')}</div>`}
function renderStudy(){const f=currentFamily(),w=currentWord(),parts=parseParts(w,f);const learned=progress.learned.includes(w.word.toLowerCase());
 $('#study').innerHTML=`<div class="card"><div class="family-head"><div><span class="tape">HỌ TỪ -${f.rime}</span><h2 class="family-title">Gốc từ: ${esc(f.root)}</h2><div>${f.words.length} từ • trang ${Math.min(...f.pages)}${Math.max(...f.pages)!==Math.min(...f.pages)?'–'+Math.max(...f.pages):''}</div></div><div class="sound-row"><button class="btn small" onclick="speak('${esc(f.root)}',.72)">🔊 Nghe gốc</button><button class="btn secondary small" onclick="speakSequence(currentFamily().words.map(x=>x.word),.72)">▶ Đọc cả họ</button></div></div>${wordSelector(f)}</div>
 <div class="card word-detail"><div class="word-main"><div class="bigword">${esc(w.word)}</div><div class="ipa">${esc(w.ipa)}</div><div class="meaning">${esc(w.meaning)}</div><span class="pos">${esc(w.pos)}</span><div class="sound-row" style="justify-content:center;margin-top:14px"><button class="btn small" onclick="speak('${esc(w.word)}',.82)">🔊 Nghe</button><button class="btn orange small" onclick="speak('${esc(w.word)}',.52)">🐢 Chậm</button><button class="btn ${learned?'green':'secondary'} small" id="learnBtn">${learned?'✓ Đã thuộc':'☆ Đánh dấu đã thuộc'}</button></div><div class="source">Bản nguồn: Phần ${w.part} • trang ${w.page}</div></div>
 <div><span class="tape">MỔ XẺ TỪ</span><h3>${esc(w.structure)}</h3>${partsHtml(w,f)}<div class="formula">${parts.map(p=>esc(p.text)).join(' + ')} <span class="arrow">→</span> <span class="highlight">${esc(w.word)}</span></div></div></div>
 <div class="card"><span class="tape">TỰ GIẢI THÍCH NHƯ FEYNMAN</span><div class="explain-step"><span class="num">1</span><div><b>Phần lõi là “${esc(f.root)}”.</b> Đây là căn nhà chính của cả gia đình từ.</div></div>${parts.filter(p=>p.type==='prefix').map(p=>`<div class="explain-step"><span class="num">2</span><div><b>Gắn “${esc(p.text)}-” ở phía trước</b> → ${esc(affixMeaning(p.text,'prefix'))}.</div></div>`).join('')}${parts.filter(p=>p.type==='suffix').map(p=>`<div class="explain-step"><span class="num">3</span><div><b>Gắn “-${esc(p.text)}” ở phía sau</b> → ${esc(affixMeaning(p.text,'suffix'))}.</div></div>`).join('')}<div class="explain-step"><span class="num">✓</span><div><b>Vậy “${esc(w.word)}” nghĩa là:</b> <span class="highlight">${esc(w.meaning)}</span>. Từ này thuộc nhóm <b>${esc(w.pos)}</b>.</div></div></div>
 <div class="grid2"><button class="card" onclick="switchView('reading')" style="text-align:left"><h3>📖 Dùng từ trong 5 câu</h3><p>Đọc câu, IPA, nghĩa tiếng Việt và nghe giọng Anh-Anh.</p></button><button class="card" onclick="switchView('builder')" style="text-align:left"><h3>🧩 Tự ghép lại từ</h3><p>Kéo các mảnh về đúng thứ tự để kiểm tra mình đã hiểu.</p></button></div>`;
 $$('.word-chip').forEach(b=>b.onclick=()=>selectWord(b.dataset.wi,'study'));$('#learnBtn').onclick=()=>toggleLearned(w.word);
}
function toggleLearned(word){word=word.toLowerCase();const i=progress.learned.indexOf(word);if(i>=0)progress.learned.splice(i,1);else progress.learned.push(word);save();toast(i>=0?'Đã bỏ đánh dấu.':'Đã lưu vào danh sách thuộc!');renderStudy()}
const IPA_MAP={this:'ðɪs',that:'ðæt',these:'ðiːz',those:'ðəʊz',is:'ɪz',are:'ɑː',was:'wɒz',were:'wɜː',a:'ə',an:'æn',the:'ðə',i:'aɪ',you:'juː',he:'hiː',she:'ʃiː',it:'ɪt',we:'wiː',they:'ðeɪ',my:'maɪ',your:'jɔː',our:'aʊə',can:'kæn',could:'kʊd',will:'wɪl',do:'duː',does:'dʌz',did:'dɪd',have:'hæv',has:'hæz',had:'hæd',been:'biːn',be:'biː',very:'ˈveri',really:'ˈrɪəli',today:'təˈdeɪ',yesterday:'ˈjestədeɪ',now:'naʊ',every:'ˈevri',day:'deɪ',here:'hɪə',there:'ðeə',together:'təˈɡeðə',carefully:'ˈkeəfəli',clearly:'ˈklɪəli',slowly:'ˈsləʊli',usually:'ˈjuːʒuəli',already:'ɔːlˈredi',currently:'ˈkʌrəntli',please:'pliːz',look:'lʊk',at:'æt',see:'siː',find:'faɪnd',use:'juːz',uses:'ˈjuːzɪz',used:'juːzd',say:'seɪ',read:'riːd',write:'raɪt',learn:'lɜːn',remember:'rɪˈmembə',talk:'tɔːk',about:'əˈbaʊt',means:'miːnz',mean:'miːn',thing:'θɪŋ',idea:'aɪˈdɪə',example:'ɪɡˈzɑːmpəl',word:'wɜːd',teacher:'ˈtiːtʃə',explains:'ɪkˈspleɪnz',feels:'fiːlz',looks:'lʊks',seems:'siːmz',why:'waɪ',how:'haʊ',what:'wɒt',who:'huː',where:'weə',with:'wɪð',in:'ɪn',on:'ɒn',to:'tuː',from:'frɒm',for:'fɔː',of:'ɒv',and:'ænd',or:'ɔː',but:'bʌt',not:'nɒt',more:'mɔː',most:'məʊst',less:'les',than:'ðæn',new:'njuː',good:'ɡʊd',simple:'ˈsɪmpəl',sentence:'ˈsentəns',class:'klɑːs',story:'ˈstɔːri',picture:'ˈpɪktʃə',often:'ˈɒfən',once:'wʌns',again:'əˈɡen'};
function sentenceToIpa(s,target,targetIpa){return '/'+s.toLowerCase().replace(/[’']/g,"'").match(/[a-z]+(?:[-'][a-z]+)*|[.,?!]/g).map(t=>{if(/[.,?!]/.test(t))return t;if(t===target.toLowerCase())return targetIpa.replace(/^\/|\/$/g,'');return IPA_MAP[t]||t}).join(' ').replace(/\s+([.,?!])/g,'$1')+'/'}
function articleFor(word){return /^[aeiou]/i.test(word)?'an':'a'}
function sentenceSet(w){const word=w.word,mean=w.meaning,pos=w.pos.toLowerCase(),st=w.structure.toLowerCase();let rows;
 if(pos.includes('trạng từ')) rows=[[`She speaks ${word}.`,`Cô ấy nói ${mean}.`],[`He works ${word}.`,`Anh ấy làm việc ${mean}.`],[`Please read it ${word}.`,`Hãy đọc nó ${mean}.`],[`They answered ${word}.`,`Họ đã trả lời ${mean}.`],[`Can you say it ${word}?`,`Em có thể nói điều đó ${mean} không?`]];
 else if((pos.includes('động từ')||pos.includes('phân từ'))&&(/\+ ed|quá khứ/.test(st)||/đã /.test(mean))) rows=[[`They ${word} it yesterday.`,`Họ đã ${mean} vào hôm qua.`],[`She has ${word} it already.`,`Cô ấy đã ${mean} rồi.`],[`We ${word} it in class.`,`Chúng tôi đã ${mean} trong lớp.`],[`He ${word} it carefully.`,`Anh ấy đã ${mean} một cách cẩn thận.`],[`The teacher ${word} it.`,`Giáo viên đã ${mean}.`]];
 else if((pos.includes('động từ')||pos.includes('phân từ'))&&(/\+ ing|hiện tại phân từ/.test(st))) rows=[[`They are ${word} now.`,`Họ đang ${mean} bây giờ.`],[`She is ${word} carefully.`,`Cô ấy đang ${mean} một cách cẩn thận.`],[`We can see them ${word}.`,`Chúng tôi có thể thấy họ đang ${mean}.`],[`He was ${word} yesterday.`,`Hôm qua anh ấy đang ${mean}.`],[`${word[0].toUpperCase()+word.slice(1)} can be hard.`,`Việc ${mean} có thể khó.`]];
 else if((pos.includes('động từ'))&&(/\+ s|ngôi thứ ba/.test(st))) rows=[[`He ${word} every day.`,`Anh ấy ${mean} mỗi ngày.`],[`She ${word} it carefully.`,`Cô ấy ${mean} nó một cách cẩn thận.`],[`My teacher ${word} it clearly.`,`Giáo viên của tôi ${mean} điều đó rõ ràng.`],[`It ${word} again.`,`Nó lại ${mean}.`],[`Who ${word} it?`,`Ai ${mean} điều đó?`]];
 else if(pos.includes('động từ')&&!pos.includes('danh từ')) rows=[[`I can ${word} now.`,`Tôi có thể ${mean} bây giờ.`],[`They ${word} every day.`,`Họ ${mean} mỗi ngày.`],[`We ${word} together.`,`Chúng tôi ${mean} cùng nhau.`],[`Do you ${word}?`,`Bạn có ${mean} không?`],[`Please ${word} carefully.`,`Hãy ${mean} một cách cẩn thận.`]];
 else if(pos.includes('tính từ')) rows=[[`It is very ${word}.`,`Nó rất ${mean}.`],[`She looks ${word} today.`,`Hôm nay cô ấy trông ${mean}.`],[`This thing seems ${word}.`,`Vật này có vẻ ${mean}.`],[`The story feels ${word}.`,`Câu chuyện tạo cảm giác ${mean}.`],[`Why is it ${word}?`,`Tại sao nó lại ${mean}?`]];
 else {const plural=/số nhiều|các |những /.test(pos+' '+mean);rows=plural?[[`These are ${word}.`,`Đây là ${mean}.`],[`I can see the ${word}.`,`Tôi có thể nhìn thấy ${mean}.`],[`The ${word} are here.`,`${mean} ở đây.`],[`Look at the ${word}.`,`Hãy nhìn ${mean}.`],[`We talk about the ${word}.`,`Chúng tôi nói về ${mean}.`]]:[[`This is ${articleFor(word)} ${word}.`,`Đây là ${mean}.`],[`I can see the ${word}.`,`Tôi có thể nhìn thấy ${mean}.`],[`The ${word} is here.`,`${mean} ở đây.`],[`Look at the ${word}.`,`Hãy nhìn ${mean}.`],[`We talk about the ${word}.`,`Chúng tôi nói về ${mean}.`]]}
 return rows.map(([en,vi])=>({en,vi,ipa:sentenceToIpa(en,word,w.ipa)}));
}

function ipaPieces(w){

 if(!raw)return [];
 const combos=['tʃ','dʒ','eɪ','aɪ','ɔɪ','aʊ','əʊ','oʊ','ɪə','eə','ʊə','iː','uː','ɑː','ɔː','ɜː'];
